services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: storyengine
      POSTGRES_PASSWORD: storyengine
      POSTGRES_DB: storyengine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyengine"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "${SE_PORT:-8100}:8000"
    environment:
      - SE_DATABASE_URL=postgresql+asyncpg://storyengine:storyengine@postgres:5432/storyengine
      - SE_DATABASE_URL_SYNC=postgresql+psycopg2://storyengine:storyengine@postgres:5432/storyengine
      - SE_REDIS_URL=redis://redis:6379/2
      - SE_OLLAMA_URL=${SE_OLLAMA_URL:-}
      - SE_DOWNLOADS_DIR=${SE_DOWNLOADS_DIR:-/data/downloads}
      - SE_WORK_DIR=/work
      - SE_SEGMENTS_DIR=/segments
      - SE_DATA_DIR=/data
      - TZ=${TZ:-UTC}
    volumes:
      - ./work:/work
      - ./segments:/segments
      - ./data:/data
      - ./config:/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      - SE_DATABASE_URL=postgresql+asyncpg://storyengine:storyengine@postgres:5432/storyengine
      - SE_DATABASE_URL_SYNC=postgresql+psycopg2://storyengine:storyengine@postgres:5432/storyengine
      - SE_REDIS_URL=redis://redis:6379/2
      - SE_OLLAMA_URL=${SE_OLLAMA_URL:-}
      - SE_DOWNLOADS_DIR=${SE_DOWNLOADS_DIR:-/data/downloads}
      - SE_WORK_DIR=/work
      - SE_SEGMENTS_DIR=/segments
      - SE_DATA_DIR=/data
      - SE_WORKER_CONCURRENCY=${SE_WORKER_CONCURRENCY:-2}
      - SE_SCAN_INTERVAL=${SE_SCAN_INTERVAL:-300}
      - TZ=${TZ:-UTC}
    volumes:
      - ./work:/work
      - ./segments:/segments
      - ./data:/data
      - ./config:/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    entrypoint: ["tini", "--"]
    command: ["celery", "-A", "app.celery_app:celery", "beat", "--loglevel=info"]
    environment:
      - SE_DATABASE_URL_SYNC=postgresql+psycopg2://storyengine:storyengine@postgres:5432/storyengine
      - SE_REDIS_URL=redis://redis:6379/2
      - SE_SCAN_INTERVAL=${SE_SCAN_INTERVAL:-300}
      - TZ=${TZ:-UTC}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${SE_FRONTEND_PORT:-3100}:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
